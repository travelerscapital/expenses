// Migrate v3 expenses to v4 (add client field)
(function(){
  if(!localStorage.getItem("tcc-exp-v4")&&localStorage.getItem("tcc-exp-v3")){
    try{var old=JSON.parse(localStorage.getItem("tcc-exp-v3"));old.forEach(function(e){if(!e.client)e.client="Personal"});localStorage.setItem("tcc-exp-v4",JSON.stringify(old))}catch(e){}
  }
})();

// ── AI Parser ──
var AI_PROMPT='You are reading receipt images to extract expense data. Return ONLY valid JSON, no markdown, no fences.\n\nSTEP 1 - IDENTIFY THE VENDOR:\nThe vendor is the RETAILER or STORE you purchased from — NOT the product brand or manufacturer. For example:\n- Best Buy order for a Logitech mouse → vendor is "Best Buy", NOT "Logitech"\n- Amazon order for a Samsung charger → vendor is "Amazon", NOT "Samsung"\n- Apple Store order for AirPods → vendor is "Apple"\nLook for the store logo, website header, or company name at the top of the receipt/order page.\nDo NOT confuse labels like "TRANSACTION RECORD", "PURCHASE", "CARDHOLDER COPY", "APPROVED" with the business name.\n\nSTEP 2 - MERGE SAME-VENUE RECEIPTS (THIS IS CRITICAL):\nIt is extremely common to have 2 or 3 receipts from the SAME restaurant in one photo — for example an itemized bill, a payment summary, and a credit card slip. These are ALL the same single transaction and MUST be merged into ONE expense object.\n\nMerge rules:\n- If ANY two receipts share the same venue/business name → they are ONE expense\n- Use the HIGHEST total among them (this is usually the credit card slip total which includes tip)\n- Use the GST/tax amount from whichever receipt shows it (usually the itemized bill)\n- If one shows a subtotal of $188 and another shows a total of $236.88 — those are the same transaction, not two expenses\n\nOnly return MULTIPLE expense objects when receipts are from DIFFERENT businesses. Return a JSON array in that case.\n\nSTEP 3 - EXTRACT DATA for each expense:\n{"vendor":"actual business name","date":"YYYY-MM-DD","province":"code","total":number,"gst":null or number,"what":"see rules","who":"see rules","category":"see list"}\n\nDATE: Read carefully. Current year is 2026. Common formats: Mar 13\'26, 03/13/2026, 2026-03-13. The year is most likely 2026 — do not default to 2020 or 2023. For online orders, use the "Order Date" not the shipping/delivery date.\n\nGST: Look carefully for GST, HST, or tax line items in the order summary. Many online receipts show GST in a summary section. If shown, use that amount. If not shown, set to null.\n\nPROVINCE: For online orders, use the SHIPPING ADDRESS province (where the buyer is located), NOT the seller\'s location. If the shipping address shows Calgary, AB → province is AB.\n\n"what" field (what the expense is for):\n- Restaurant/bar/cafe/coffee shop: "Meals"\n- Telecom (Telus/Bell/Rogers): "Phone"\n- Parking: "Parking"\n- Office supplies/electronics: name the specific item e.g. "Mouse", "Charger", "Monitor", "Keyboard"\n- Fuel: "Fuel"\n- Flights: "Flight", Hotels: "Hotel"\n- Conferences/events: "Networking Event" or event name\n- General: brief 2-3 word description\n\n"who" field (who it is for/related to):\n- Office supplies, telecom, parking, fuel, subscriptions: "Internal"\n- Meals/entertainment: leave as "" (empty) — user will fill in\n- Training/conferences: "Internal" unless clearly for a client\n- If unclear: leave as "" (empty)\n\nCATEGORY must be one of: Meals & Entertainment, Travel, Other, Fuel & Mileage, Telephone, Office Supplies, Subscriptions & Dues, IT Expense, Training & Education, Advertising & Promotion, Postage & Courier, Gift, Donations\n\nPROVINCE codes: AB=Alberta, BC=British Columbia, MB=Manitoba, ON=Ontario, SK=Saskatchewan, N.L=Newfoundland, YT=Yukon, QC=Quebec, FOREIGN=outside Canada\n\nTOTAL — THIS IS CRITICAL: Use the FINAL grand total, NOT the subtotal or the product price. Look for "Order Total", "Total", or "Amount Charged". Many receipts show a Product Subtotal, then shipping, then tax, then a FINAL Order Total — always use the Order Total. For example if a receipt shows Subtotal $129.99, GST $6.50, Order Total $136.49 — use 136.49.';


function parseReceipt(base64,mime){
  var key=LS.apiKey.get();
  if(!key)return Promise.resolve({error:"No API key set"});
  var contentBlock;
  if(mime==="application/pdf"){
    contentBlock={type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}};
  } else {
    contentBlock={type:"image",source:{type:"base64",media_type:mime,data:base64}};
  }
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-dangerous-direct-browser-access":"true","anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
      messages:[{role:"user",content:[
        contentBlock,
        {type:"text",text:AI_PROMPT}
      ]}]})
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){return{error:"API returned "+r.status+": "+t.substring(0,200)}});
    return r.json();
  }).then(function(d){
    if(d.error)return{error:typeof d.error==="string"?d.error:(d.error.message||JSON.stringify(d.error))};
    var t=(d.content||[]).map(function(b){return b.text||""}).join("").replace(/```json|```/g,"").trim();
    try{return JSON.parse(t)}catch(e){return{error:"Could not parse AI response: "+t.substring(0,200)}}
  }).catch(function(e){
    var msg=e.message||"Unknown error";
    if(msg.indexOf("Failed to fetch")>=0||msg.indexOf("NetworkError")>=0||msg.indexOf("Load failed")>=0)msg="Network error \u2014 check connection or API key.";
    return{error:msg};
  });
}

// ── XLSX Export (template-based) ──
function dateToSerial(dateStr){
  var p=dateStr.split("-");var d=new Date(+p[0],+p[1]-1,+p[2]);
  var epoch=new Date(1899,11,30);
  return Math.round((d-epoch)/86400000);
}
function xmlEsc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function setCell(xml,ref,value,isString){
  var re=new RegExp('<c r="'+ref+'"([^>]*)(?:/>|>[\\s\\S]*?</c>)');
  var m=re.exec(xml);if(!m)return xml;
  var sMatch=/s="(\d+)"/.exec(m[1]);
  var s=sMatch?' s="'+sMatch[1]+'"':'';
  var rep;
  if(isString){
    rep='<c r="'+ref+'"'+s+' t="inlineStr"><is><t>'+xmlEsc(value)+'</t></is></c>';
  } else {
    rep='<c r="'+ref+'"'+s+'><v>'+value+'</v></c>';
  }
  return xml.replace(m[0],rep);
}
function exportXLSX(expenses,currency,label,clientName){
  var rows=expenses.filter(function(e){return e.currency===currency});
  if(!rows.length)return Promise.resolve(null);
  rows.sort(function(a,b){return a.date>b.date?1:a.date<b.date?-1:0});

  var tplB64=currency==="CAD"?TPL_CAD:TPL_USD;
  var raw=atob(tplB64);var arr=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);

  return JSZip.loadAsync(arr).then(function(zip){
    return zip.file("xl/worksheets/sheet2.xml").async("string").then(function(xml){
      // Fill employee name (E4)
      var empName=LS.profile.field("name","");
      if(empName)xml=setCell(xml,"E4",empName,true);

      // Fill date (E5) — last day of the expense month
      var lbl=label.split("_");
      var mNames={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
      var yr=+(lbl[1]||new Date().getFullYear());
      var mn=mNames[lbl[0]]||1;
      var lastDay=new Date(yr,mn,0);
      var serial=Math.round((lastDay-new Date(1899,11,30))/86400000);
      xml=setCell(xml,"E5",serial,false);

      // Fill data rows (12–54, max 43 rows)
      for(var i=0;i<43&&i<rows.length;i++){
        var rn=12+i;var ex=rows[i];
        // B: date
        xml=setCell(xml,"B"+rn,dateToSerial(ex.date),false);
        // C: province
        xml=setCell(xml,"C"+rn,ex.province,true);
        // D: paid to
        xml=setCell(xml,"D"+rn,ex.vendor,true);
        // E: description
        xml=setCell(xml,"E"+rn,buildDescription(ex),true);
        // F: category
        xml=setCell(xml,"F"+rn,ex.category,true);
        // G: total
        xml=setCell(xml,"G"+rn,Number(ex.total),false);
        // H: GST (only if provided)
        if(ex.gst!=null&&ex.gst!==""&&Number(ex.gst)>0){
          xml=setCell(xml,"H"+rn,Number(ex.gst),false);
        }
        // T/U: FX columns for USD
        if(currency==="USD"&&ex.cadEquiv){
          xml=setCell(xml,"T"+rn,Number(ex.cadEquiv),false);
          xml=setCell(xml,"U"+rn,Number(ex.cadEquiv)/Number(ex.total),false);
        }
      }

      zip.file("xl/worksheets/sheet2.xml",xml);
      // Remove calcChain.xml to force Excel to recalculate
      zip.remove("xl/calcChain.xml");
      return zip.generateAsync({type:"arraybuffer"});
    }).then(function(data){
      var prefix=currency==="CAD"?"TCC_Expense_Form_":"TCC_Financial_Expense_Form_";
      var suffix=clientName&&clientName!=="Personal"?"_"+clientName.replace(/[^a-zA-Z0-9]/g,"_"):"";
      var fname=prefix+label+suffix+".xlsx";
      return{name:fname,data:data};
    });
  });
}


// ── Receipt PDF compilation ──
function exportReceiptsPDF(expenses,label,clientName){
  if(!expenses.length)return Promise.resolve(null);
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  var pageW=210,margin=15,usableW=pageW-2*margin,usableH=297-2*margin;
  var first=true;var count=0;
  function addImage(dataUrl,info){
    return new Promise(function(resolve){
      var img=new Image();
      img.onload=function(){
        if(!first)doc.addPage();first=false;
        doc.setFontSize(10);doc.setTextColor(100);doc.text(info,margin,margin);
        var startY=margin+8;var availH=usableH-8;
        var ratio=Math.min(usableW/img.width,availH/img.height,1);
        var w=img.width*ratio;var hh=img.height*ratio;
        if(w>usableW){ratio=usableW/img.width;w=img.width*ratio;hh=img.height*ratio}
        if(hh>availH){ratio=availH/img.height;w=img.width*ratio;hh=img.height*ratio}
        try{doc.addImage(dataUrl,"JPEG",margin+(usableW-w)/2,startY,w,hh)}catch(e){doc.text("Receipt image could not be embedded",margin,startY+10)}
        count++;resolve();
      };img.onerror=function(){if(!first)doc.addPage();first=false;doc.setFontSize(12);doc.text("Receipt not available",margin,margin+10);count++;resolve()};
      img.src=dataUrl;
    });
  }
  function renderPdfReceipt(pdfDataUrl,info){
    return new Promise(function(resolve){
      try{
        var b64=pdfDataUrl.split(",")[1];
        var raw=atob(b64);var arr=new Uint8Array(raw.length);
        for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
        pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        pdfjsLib.getDocument({data:arr}).promise.then(function(pdf){
          var pChain=Promise.resolve();
          for(var p=1;p<=pdf.numPages;p++){
            (function(pageNum){
              pChain=pChain.then(function(){
                return pdf.getPage(pageNum).then(function(page){
                  var scale=2;
                  var viewport=page.getViewport({scale:scale});
                  var canvas=document.createElement("canvas");
                  canvas.width=viewport.width;canvas.height=viewport.height;
                  var ctx=canvas.getContext("2d");
                  return page.render({canvasContext:ctx,viewport:viewport}).promise.then(function(){
                    var imgUrl=canvas.toDataURL("image/jpeg",0.8);
                    var pgInfo=pdf.numPages>1?info+" (pg "+pageNum+"/"+pdf.numPages+")":info;
                    return addImage(imgUrl,pgInfo);
                  });
                });
              });
            })(p);
          }
          pChain.then(resolve);
        }).catch(function(){resolve()});
      }catch(e){resolve()}
    });
  }
  var chain=Promise.resolve();
  expenses.forEach(function(exp,idx){
    chain=chain.then(function(){
      var rcpt=LS.receipt.get(exp.id);if(!rcpt||rcpt==="PDF_RECEIPT")return;
      var info="#"+(idx+1)+" | "+exp.date+" | "+exp.vendor+" | $"+Number(exp.total).toFixed(2);
      // PDF receipt — render pages via pdf.js
      if(rcpt.indexOf("data:application/pdf")===0){
        return renderPdfReceipt(rcpt,info);
      }
      // Image receipt (single or multi-page)
      var pages=[];
      try{if(rcpt.charAt(0)==='['){pages=JSON.parse(rcpt)}else{pages=[rcpt]}}catch(e){pages=[rcpt]}
      var pageChain=Promise.resolve();
      pages.forEach(function(pg,pi){
        pageChain=pageChain.then(function(){
          var lbl=pages.length>1?info+" (pg "+(pi+1)+"/"+pages.length+")":info;
          return addImage(pg,lbl);
        });
      });
      return pageChain;
    });
  });
  return chain.then(function(){
    if(!count)return null;
    var suffix=clientName&&clientName!=="Personal"?"_"+clientName.replace(/[^a-zA-Z0-9]/g,"_"):"";
    var fname="Receipts_"+label+suffix+".pdf";
    var pdfData=doc.output("arraybuffer");
    return{name:fname,data:pdfData};
  });
}

// ── ZIP Export (bundles everything) ──
function doExportZip(allExpenses,monthLabel){
  if(!allExpenses.length){alert("No expenses to export.");return}
  // Group by client
  var groups={};
  allExpenses.forEach(function(e){var cl=e.client||"Personal";if(!groups[cl])groups[cl]=[];groups[cl].push(e)});

  var zip=new JSZip();
  var pdfPromises=[];

  for(var client in groups){
    var exps=groups[client].sort(function(a,b){return a.date>b.date?1:-1});
    var folder=client==="Personal"?"Personal":client.replace(/[^a-zA-Z0-9 ]/g,"_");

    // Split by currency
    var cadExps=exps.filter(function(e){return e.currency==="CAD"});
    var usdExps=exps.filter(function(e){return e.currency==="USD"});

    // Excel files per currency
    if(cadExps.length){
      pdfPromises.push((function(ex,fld){
        return exportXLSX(ex,"CAD",monthLabel,client).then(function(result){
          if(result)zip.file(fld+"/"+result.name,result.data);
        });
      })(cadExps,folder));
    }
    if(usdExps.length){
      pdfPromises.push((function(ex,fld){
        return exportXLSX(ex,"USD",monthLabel,client).then(function(result){
          if(result)zip.file(fld+"/"+result.name,result.data);
        });
      })(usdExps,folder));
    }

    // Receipt PDFs per currency
    if(cadExps.length){
      pdfPromises.push((function(cl,ex,fld){
        return exportReceiptsPDF(ex,monthLabel,cl).then(function(result){
          if(result)zip.file(fld+"/"+result.name,result.data);
        });
      })(client,cadExps,folder));
    }
    if(usdExps.length){
      pdfPromises.push((function(cl,ex,fld){
        return exportReceiptsPDF(ex,monthLabel,cl+"_USD").then(function(result){
          if(result)zip.file(fld+"/"+result.name,result.data);
        });
      })(client,usdExps,folder));
    }
  }

  Promise.all(pdfPromises).then(function(){
    if(Object.keys(zip.files).length===0){alert("No expenses to export.");return}
    // Include backup JSON
    var backup={expenses:allExpenses,clients:LS.clients.get(),profile:LS.profile.get(),exportDate:new Date().toISOString(),version:APP_VERSION};
    zip.file("backup.json",JSON.stringify(backup,null,2));
    return zip.generateAsync({type:"blob"});
  }).then(function(blob){
    if(!blob)return;
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="TCC_Expenses_"+monthLabel+".zip";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  });
}

// ── FX Reconcile: match USD expenses to bank CSV ──
function parseBankCSV(csvText){
  var lines=csvText.split("\n");
  if(lines.length<2)return[];
  var header=lines[0].split(",");
  var dateIdx=header.indexOf("Date");
  var postedIdx=header.indexOf("Posted Date");
  var merchantIdx=header.indexOf("Merchant Name");
  var amountIdx=header.indexOf("Amount");
  var countryIdx=header.indexOf("Merchant Country Code");
  var results=[];
  for(var i=1;i<lines.length;i++){
    var cols=lines[i].split(",");
    if(cols.length<amountIdx+1)continue;
    var amt=cols[amountIdx]?cols[amountIdx].replace("$","").replace(/"/g,"").trim():"";
    if(!amt||amt.indexOf("-")===0)continue;
    results.push({
      date:cols[dateIdx]?cols[dateIdx].trim():"",
      posted:cols[postedIdx]?cols[postedIdx].trim():"",
      merchant:cols[merchantIdx]?cols[merchantIdx].replace(/"/g,"").trim():"",
      amount:parseFloat(amt)||0,
      country:cols[countryIdx]?cols[countryIdx].replace(/"/g,"").trim():""
    });
  }
  return results;
}

function matchExpenseToBank(expense,bankTxns){
  var vendorLower=(expense.vendor||"").toLowerCase().replace(/[^a-z0-9]/g,"");
  var expDate=expense.date||"";
  var bestMatch=null;var bestScore=0;
  bankTxns.forEach(function(tx){
    var mLower=(tx.merchant||"").toLowerCase().replace(/[^a-z0-9]/g,"");
    // Name similarity: check if vendor name appears in merchant or vice versa
    var nameScore=0;
    if(vendorLower.length>2&&mLower.indexOf(vendorLower.substring(0,Math.min(vendorLower.length,8)))>=0)nameScore=3;
    else if(mLower.length>2&&vendorLower.indexOf(mLower.substring(0,Math.min(mLower.length,8)))>=0)nameScore=2;
    // Check first 4 chars
    else if(vendorLower.substring(0,4)===mLower.substring(0,4))nameScore=1;
    if(nameScore===0)return;
    // Date proximity (within 5 days)
    var d1=new Date(expDate);var d2=new Date(tx.date);var d3=new Date(tx.posted);
    var diff1=Math.abs(d1-d2)/(86400000);var diff2=Math.abs(d1-d3)/(86400000);
    var dateDiff=Math.min(diff1,diff2);
    if(dateDiff>5)return;
    var dateScore=5-dateDiff;
    var score=nameScore*10+dateScore;
    if(score>bestScore){bestScore=score;bestMatch=tx}
  });
  return bestMatch;
}

  var lines=[];var grandTotalCAD=0;var grandTotalUSD=0;

  if(groups["Personal"]){

    var pUSD=groups["Personal"].filter(function(e){return e.currency==="USD"});

      if(tcad>0)line+=" (CAD $"+fmt(tcad)+")";
      lines.push(line);
      grandTotalUSD+=tu;
    }
  });

  lines.push("");
  var grandTotalCADEquiv=grandTotalCAD;
  if(grandTotalUSD>0){
    var usdCadTotal=allExpenses.filter(function(e){return e.currency==="USD"}).reduce(function(s,e){return s+(Number(e.cadEquiv)||0)},0);
    lines.push("CAD Total: $"+fmt(grandTotalCAD));

    if(usdCadTotal>0){
      lines.push("Combined Total (CAD): $"+fmt(grandTotalCAD+usdCadTotal));
    }
  } else {
    lines.push("Total: $"+fmt(grandTotalCAD)+" CAD");
  }

  var empName=LS.profile.field("name","");
  var emailTo=LS.profile.field("emailTo","");
  var emailCc=LS.profile.field("emailCc","");
  var addressee=LS.profile.field("emailGreeting","");
  var emailGreeting=addressee?"Hi "+addressee+",":"Hi,";

  if(!empName||!emailTo){alert("Please set your name and email recipients in Settings first.");return}

  var subject=monthName+" "+year+" Expenses - "+empName;
  var body=emailGreeting+"\n\n"+lines.join("\n")+"\n\nThanks!";

  // Try ms-outlook first, fallback to mailto
  var outlookUrl="ms-outlook://compose?to="+encodeURIComponent(emailTo)+"&cc="+encodeURIComponent(emailCc)+"&subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);

// ── Image compression (keeps under 5MB API limit) ──
function compressImage(dataUrl){
  var maxBytes=4200000;
  var maxPixel=7900; // API limit is 8000px per dimension
  return new Promise(function(resolve){
    var b64=dataUrl.split(",")[1];
    var mime=dataUrl.split(";")[0].split(":")[1]||"image/jpeg";
    // Skip compression for PDFs — send directly
    if(mime==="application/pdf"){resolve({dataUrl:dataUrl,b64:b64,mime:mime});return}
    // Always check dimensions even if file size is OK
    var img=new Image();
    img.onload=function(){
      var w=img.width,hh=img.height;
      // If within both limits, pass through
      if(b64.length*0.75<maxBytes&&w<=maxPixel&&hh<=maxPixel){resolve({dataUrl:dataUrl,b64:b64,mime:mime});return}
      var canvas=document.createElement("canvas");
      // First, enforce pixel limit
      var cw=w,ch=hh;
      if(cw>maxPixel||ch>maxPixel){
        var scale=Math.min(maxPixel/cw,maxPixel/ch);
        cw=Math.round(cw*scale);ch=Math.round(ch*scale);
      }
      canvas.width=cw;canvas.height=ch;
      canvas.getContext("2d").drawImage(img,0,0,cw,ch);
      var compressed=canvas.toDataURL("image/jpeg",0.85);
      // If still too large in bytes, step down further
      if(compressed.split(",")[1].length*0.75>maxBytes){
        var attempts=[{dim:3000,q:0.85},{dim:2400,q:0.8},{dim:2000,q:0.7},{dim:1600,q:0.6},{dim:1200,q:0.5}];
        for(var i=0;i<attempts.length;i++){
          var a=attempts[i];cw=w;ch=hh;
          var dimLimit=Math.min(a.dim,maxPixel);
          if(cw>dimLimit||ch>dimLimit){
            var s2=Math.min(dimLimit/cw,dimLimit/ch);
            cw=Math.round(cw*s2);ch=Math.round(ch*s2);
          }
          canvas.width=cw;canvas.height=ch;
          canvas.getContext("2d").drawImage(img,0,0,cw,ch);
          compressed=canvas.toDataURL("image/jpeg",a.q);
          if(compressed.split(",")[1].length*0.75<maxBytes)break;
        }
      }
      resolve({dataUrl:compressed,b64:compressed.split(",")[1],mime:"image/jpeg"});
    };
    img.onerror=function(){resolve({dataUrl:dataUrl,b64:b64,mime:mime})};
    img.src=dataUrl;
  });
}
// Compress for storage (small for PDFs, ~200KB target per receipt)
function compressForStorage(dataUrl){
  return new Promise(function(resolve){
    var mime=dataUrl.split(";")[0].split(":")[1]||"image/jpeg";
    // PDFs — store as-is (no image compression possible)
    if(mime==="application/pdf"){resolve(dataUrl);return}
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement("canvas");
      var maxDim=1000;
      var w=img.width,hh=img.height;
      if(w>maxDim||hh>maxDim){
        if(w>hh){hh=Math.round(hh*(maxDim/w));w=maxDim}else{w=Math.round(w*(maxDim/hh));hh=maxDim}
      }
      canvas.width=w;canvas.height=hh;
      canvas.getContext("2d").drawImage(img,0,0,w,hh);
      var compressed=canvas.toDataURL("image/jpeg",0.35);
      resolve(compressed);
    };
    img.onerror=function(){resolve(dataUrl)};
    img.src=dataUrl;
  });
}

// ── Clipboard paste handler (shared by paste button and paste view) ──
function handleClipboardPaste(){
  if(!navigator.clipboard||!navigator.clipboard.read){alert("Clipboard not available.");return}
  navigator.clipboard.read().then(function(items){
    for(var i=0;i<items.length;i++){
      var item=items[i];var imgType=null;
      for(var j=0;j<item.types.length;j++){if(item.types[j].indexOf("image/")===0){imgType=item.types[j];break}}
      if(imgType){
        item.getType(imgType).then(function(blob){
          var reader=new FileReader();
          reader.onload=function(ev){
            var dataUrl=ev.target.result;
            ST.img=dataUrl;ST.parsing=true;ST.parseError=null;ST.form=emptyForm();ST.view="add";render();
            compressImage(dataUrl).then(function(c){
            parseReceipt(c.b64,c.mime).then(function(parsed){
              if(parsed&&!parsed.error){
                var items=Array.isArray(parsed)?parsed:parsed.vendor?[parsed]:[];
                if(items.length>1){
                  var results=items.map(function(p){return{data:p,img:dataUrl,error:null}});
                  up({view:"batch",batchQueue:[],batchResults:results,batchProcessing:false,batchIdx:0,parsing:false});
                } else if(items.length===1){
                  var p=items[0];
                  var fm=emptyForm();
                  if(p.vendor)fm.vendor=p.vendor;if(p.date)fm.date=p.date;
                  if(p.province&&PROVINCES.indexOf(p.province)>=0){fm.province=p.province;if(p.province==="FOREIGN")fm.currency="USD"}
                  if(p.total!=null)fm.total=String(p.total);
                  if(p.gst!=null&&p.gst!==0)fm.gst=String(p.gst);else fm.gst="";
                  if(p.description)fm.what=p.description;
                  if(p.what)fm.what=p.what;if(p.who)fm.who=p.who;
                  if(p.category&&CATEGORIES.indexOf(p.category)>=0)fm.category=p.category;
                  up({form:fm,parsing:false,parseError:null});
                } else {up({parsing:false,parseError:"No expenses found"})}
              } else {up({parsing:false,parseError:parsed?parsed.error:"Could not read receipt"})}
            });
            });
          };reader.readAsDataURL(blob);
        });return;
      }
    }
    alert("No image on clipboard. Make sure your Shortcut converts PDFs to images first (Make Image from Page).");
  }).catch(function(err){
    var msg=err.message||"";
    if(msg.indexOf("denied")>=0)alert("Clipboard permission denied. Try tapping again.");
    else alert("Could not read clipboard: "+msg);
  });
}

window._autoCapture=false;
function checkURLTriggers(){
  var c=(window.location.search||"")+(window.location.hash||"");
  if(c.indexOf("capture")>=0){window._autoCapture=true;ST.view="batch";ST.batchQueue=[];ST.batchResults=[];ST.batchProcessing=false;ST.batchIdx=0;
    if(window.history&&window.history.replaceState)window.history.replaceState({},"",window.location.pathname);render();return true}
  if(c.indexOf("paste")>=0){ST.view="paste";
    if(window.history&&window.history.replaceState)window.history.replaceState({},"",window.location.pathname);render();return true}
  return false;
}
